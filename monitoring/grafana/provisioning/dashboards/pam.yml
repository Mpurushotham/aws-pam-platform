---
# Loads the PAM dashboards from disk into the "PAM" folder on Grafana startup.
apiVersion: 1

providers:
  - name: pam-dashboards
    orgId: 1
    folder: PAM
    type: file
    disableDeletion: false
    updateIntervalSeconds: 60
    allowUiUpdates: false
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
