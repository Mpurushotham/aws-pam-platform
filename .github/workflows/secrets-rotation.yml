---
name: Secrets Rotation

# Weekly automated rotation of PAM-managed secrets, plus an on-demand path to
# rotate (or roll back) a single secret. Uses OIDC; no static credentials.
on:
  schedule:
    - cron: "0 3 * * 0"   # 03:00 UTC every Sunday
  workflow_dispatch:
    inputs:
      secret_id:
        description: "Single secret to act on (blank = rotate all managed secrets)"
        required: false
        type: string
      rollback:
        description: "Roll back the secret to its previous value"
        required: false
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  SECRET_PREFIX: pam-prod/

jobs:
  rotate:
    name: Rotate secrets
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROTATION_ROLE }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gha-rotation

      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: pip
      - run: pip install -r scripts/python/requirements.txt

      - name: Rotate or roll back a single secret
        if: github.event.inputs.secret_id != ''
        run: |
          ROLLBACK_FLAG=""
          if [ "${{ github.event.inputs.rollback }}" = "true" ]; then
            ROLLBACK_FLAG="--rollback"
          fi
          python scripts/python/pam_secret_rotation.py \
            --region "$AWS_REGION" \
            --secret-id "${{ github.event.inputs.secret_id }}" $ROLLBACK_FLAG

      - name: Rotate all managed secrets (scheduled run)
        if: github.event.inputs.secret_id == ''
        run: |
          IDS=$(aws secretsmanager list-secrets \
            --query "SecretList[?starts_with(Name, '${SECRET_PREFIX}')].Name" \
            --output text)
          if [ -z "$IDS" ]; then
            echo "No managed secrets found under ${SECRET_PREFIX}"; exit 0
          fi
          for id in $IDS; do
            echo "::group::rotate $id"
            python scripts/python/pam_secret_rotation.py \
              --region "$AWS_REGION" --secret-id "$id" \
              || echo "::warning::rotation failed for $id"
            echo "::endgroup::"
          done
