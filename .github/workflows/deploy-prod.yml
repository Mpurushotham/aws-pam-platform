---
name: Deploy Prod

# Manual, approval-gated production deploy. The `production` GitHub Environment
# must be configured with required reviewers so apply blocks until approved.
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy-prod" to confirm a production apply'
        required: true
        type: string

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  TF_DIR: terraform/environments/prod

jobs:
  guard:
    name: Validate confirmation
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation phrase
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "deploy-prod" ]; then
            echo "::error::confirmation phrase mismatch; aborting"
            exit 1
          fi

  plan:
    name: terraform plan (prod)
    needs: guard
    runs-on: ubuntu-latest
    environment: production-plan
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_PROD }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gha-plan-prod
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.7"
      - run: terraform -chdir="$TF_DIR" init
      - run: terraform -chdir="$TF_DIR" plan -out=tfplan -input=false
      - uses: actions/upload-artifact@v4
        with:
          name: tfplan-prod
          path: ${{ env.TF_DIR }}/tfplan
          retention-days: 5

  apply:
    name: terraform apply (prod)
    needs: plan
    runs-on: ubuntu-latest
    # `production` environment carries required-reviewer protection — apply
    # pauses here until a human approves the deployment.
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_PROD }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gha-apply-prod
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.7"
      - run: terraform -chdir="$TF_DIR" init
      - uses: actions/download-artifact@v4
        with:
          name: tfplan-prod
          path: ${{ env.TF_DIR }}
      - run: terraform -chdir="$TF_DIR" apply -input=false -auto-approve tfplan
